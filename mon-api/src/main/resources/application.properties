# ─── Serveur ──────────────────────────────────────────────────
# PORT est fourni par l'hebergeur (Render, Railway...) ; 8080 en local.
server.port=${PORT:8080}

# Charge sdk-podcast/mon-api/.env (GOOGLE_CLIENT_ID, SMTP, etc.) si présent.
spring.config.import=optional:file:.env[.properties]

# ─── Base de donnees ──────────────────────────────────────────
# En prod : definir DB_URL / DB_USERNAME / DB_PASSWORD (ne pas committer les secrets).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ngpodcast}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA — laisser Flyway gérer le schema, pas Hibernate ──────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ─── JWT ──────────────────────────────────────────────────────
# En prod : JWT_SECRET obligatoire (≥ 256 bits pour HS256 recommandé par jjwt).
jwt.secret=${JWT_SECRET:ngpodcast_super_secret_key_minimum_32_chars_2026}
jwt.expiration-ms=86400000

# ─── Reset mot de passe ───────────────────────────────────────
# En production : false. Si true, POST /auth/reset-password renvoie le jeton dans le JSON (tests locaux).
app.password-reset.expose-token=false

# ─── Auth Google / verification email ────────────────────────
# Remplacer par le client ID OAuth 2.0 Web créé dans Google Cloud Console.
google.client-id=${GOOGLE_CLIENT_ID:}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}
app.api-public-url=${APP_API_PUBLIC_URL:http://127.0.0.1:8080}
app.mail.from=${MAIL_FROM:no-reply@ng-podcast.local}

# SMTP optionnel. Tant qu'il n'est pas configuré, les liens de verification sont loggés côté API.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Stockage local ───────────────────────────────────────────
storage.local.path=uploads
storage.base-url=http://localhost:8080/files

# ─── Upload ───────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ─── Logs ─────────────────────────────────────────────────────
logging.level.com.ngpodcast=DEBUG
logging.level.org.flywaydb=INFO