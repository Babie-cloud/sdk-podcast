# ─── Serveur ──────────────────────────────────────────────────
server.port=8080

# ─── Base de donnees ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/ngpodcast
# En prod : definir DB_USERNAME / DB_PASSWORD (ne pas committer les secrets).
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA — laisser Flyway gérer le schema, pas Hibernate ──────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ─── JWT ──────────────────────────────────────────────────────
# En prod : JWT_SECRET obligatoire (≥ 256 bits pour HS256 recommandé par jjwt).
jwt.secret=${JWT_SECRET:ngpodcast_super_secret_key_minimum_32_chars_2026}
jwt.expiration-ms=86400000

# ─── Reset mot de passe ───────────────────────────────────────
# En production : false. Si true, POST /auth/reset-password renvoie le jeton dans le JSON (tests locaux).
app.password-reset.expose-token=false

# ─── Stockage local ───────────────────────────────────────────
storage.local.path=uploads
storage.base-url=http://localhost:8080/files

# ─── Upload ───────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ─── Logs ─────────────────────────────────────────────────────
logging.level.com.ngpodcast=DEBUG
logging.level.org.flywaydb=INFO