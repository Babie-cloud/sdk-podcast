# Test Configuration - Using H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging)
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway Configuration for Tests
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# JWT
jwt.secret=ngpodcast_super_secret_key_minimum_32_chars_2026
jwt.expiration-ms=86400000

# Password Reset
app.password-reset.expose-token=true

# Storage
storage.local.path=uploads
storage.base-url=http://localhost:8080/files

# Logging
logging.level.com.ngpodcast=DEBUG
logging.level.org.flywaydb=INFO
